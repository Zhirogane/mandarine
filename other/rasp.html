<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="rasp.png">
    <title>Project Raspberry PJMD</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #b10949;
        }
        .container {
            background-color: #790632;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #FFF;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #DDD;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .buttons-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .button {
            display: block;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .sonolus {
            background-color: #e30b5d;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .change {
            background: linear-gradient(180deg, 
             #ff5100, #e2943a, #f7a400, #e30b5d, #ff5100);
        background-size: 100% 1000%;
        animation: gradientMove 12s linear infinite;
        color: #FFF;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    @keyframes gradientMove {
        0% { background-position: 0% 0%; }
        100% { background-position: 0% 100%; }
    }
    </style>
</head>
<body>
<div class="container">
    <h1>Welcome to Project Raspberry Web</h1>
    <p>This server is not aviable yet</p>
    <p>You can find the new rhythm game soon</p>
    <div class="buttons-wrapper">
        <a href="sonolus://shir0g4ne.github.io/mandarine" class="button sonolus">Open in Sonolus</a>
        <a href="change.html" class="button change">Change Theme</a>
    </div>
</div>
</body>
</html>
